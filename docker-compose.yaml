services:
  # MinIO Instance 1
  minio1:
    image: quay.io/minio/minio:latest
    restart: always
    command: server --address ":9100" --console-address ":9101" http://minio{1...4}/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio1-data:/data
    networks:
      - minio-net

  # MinIO Instance 2
  minio2:
    image: quay.io/minio/minio:latest
    restart: always
    command: server --address ":9100" --console-address ":9101" http://minio{1...4}/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio2-data:/data
    networks:
      - minio-net

  # MinIO Instance 3
  minio3:
    image: quay.io/minio/minio:latest
    restart: always
    command: server --address ":9100" --console-address ":9101" http://minio{1...4}/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio3-data:/data
    networks:
      - minio-net

  # MinIO Instance 4
  minio4:
    image: quay.io/minio/minio:latest
    restart: always
    command: server --address ":9100" --console-address ":9101" http://minio{1...4}/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio4-data:/data
    networks:
      - minio-net

  # HAProxy for MinIO Load Balancing
  haproxy:
    image: haproxy:latest
    restart: always
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8200:9100"  # MinIO API
      - "8201:9101"  # MinIO Console
    networks:
      - minio-net
    depends_on:
      - minio1
      - minio2
      - minio3
      - minio4

  # Nexus Repository Manager
  nexus:
    image: sonatype/nexus3:latest
    restart: unless-stopped
    container_name: nexus
    volumes:
      - ./nexus-data:/nexus-data
    ports:
      - "9090:8081"
      - "8082:8082"
      - "8085:8085"
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms1024m -Xmx2048m -XX:MaxDirectMemorySize=2g -Djava.util.prefs.userRoot=/nexus-data
      #- TZ=Europe/Moscow
      #- NEXUS_DATASTORE_NEXUS_JDBCURL=jdbc:postgresql://postgres:5432/nexus
      #- NEXUS_DATASTORE_NEXUS_USERNAME=${POSTGRES_USER}
      #- NEXUS_DATASTORE_NEXUS_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - minio-net
    depends_on:
      - postgres

  # Nginx proxy
  nginx:
    image: nginx:latest
    restart: always
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - minio-net
    depends_on:
      - nexus

  # PostgreSQL database
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    networks:
      - minio-net

  # VictoriaMetrics вместо Prometheus
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    restart: always
    container_name: victoriametrics
    volumes:
      - ./victoria-metrics-data:/storage
    ports:
      - "9091:8428"  # VictoriaMetrics UI и API
    networks:
      - minio-net
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=1"
    depends_on:
      - nexus

  # VM Agent для сбора метрик
  vmagent:
    image: victoriametrics/vmagent:latest
    restart: always
    container_name: vmagent
    volumes:
      - ./vmagent-config.yml:/etc/vmagent/config.yml:ro
    command:
      - "-remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "-promscrape.config=/etc/vmagent/config.yml"
    networks:
      - minio-net
    depends_on:
      - victoriametrics

  # Grafana для визуализации
  grafana:
    image: grafana/grafana:latest
    restart: always
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - minio-net
    depends_on:
      - victoriametrics

volumes:
  minio1-data:
  minio2-data:
  minio3-data:
  minio4-data:
  nexus-data:
  postgres-data:
  grafana-data:
  victoria-metrics-data:

networks:
  minio-net:
