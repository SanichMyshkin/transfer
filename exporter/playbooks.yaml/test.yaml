---
- name: Download GitLab nexus-cleaner files to target host
  hosts: your_target_host
  gather_facts: false
  vars:
    gitlab_url: "https://gitlab.example.com"
    private_token: "{{ lookup('env', 'GITLAB_TOKEN') }}"
    group_id: "your_group_id"
    branch: "master"
    output_dir: "/opt/nexus/configs"

  tasks:

    - name: Get all projects in group
      uri:
        url: "{{ gitlab_url }}/api/v4/groups/{{ group_id }}/projects?per_page=100"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ private_token }}"
        return_content: true
      register: projects_response

    - name: Set project list
      set_fact:
        projects: "{{ projects_response.json }}"

    - name: Ensure output directory exists
      file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'

    - name: Get file list from each project
      uri:
        url: "{{ gitlab_url }}/api/v4/projects/{{ item.id }}/repository/tree?path=nexus/nexus-cleaner&ref={{ branch }}"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ private_token }}"
        return_content: true
      loop: "{{ projects }}"
      loop_control:
        label: "{{ item.name }}"
      register: file_lists

    - name: Flatten files to download
      set_fact:
        files_to_download: >-
          {{
            file_lists.results
            | zip(projects)
            | map('combine')
            | map('combine', {'files': attribute('json')})
            | selectattr('files', 'defined')
            | selectattr('files', '!=', [])
            | list
          }}

    - name: Download and save files
      vars:
        project_id: "{{ item.1.id }}"
        project_name: "{{ item.1.path_with_namespace | regex_replace('/', '_') }}"
      loop: "{{ files_to_download | map(attribute='files') | list | zip(files_to_download | map(attribute='item')) | list }}"
      loop_control:
        label: "{{ item.1.name }}"
      delegate_to: localhost
      with_nested:
        - "{{ item.0 }}"
      tasks:

        - name: Get file content
          uri:
            url: "{{ gitlab_url }}/api/v4/projects/{{ project_id }}/repository/files/{{ item.path | urlencode }}/raw?ref={{ branch }}"
            method: GET
            headers:
              PRIVATE-TOKEN: "{{ private_token }}"
            return_content: true
          register: raw_file

        - name: Save file
          copy:
            dest: "{{ output_dir }}/{{ project_name }}_{{ item.name }}"
            content: "{{ raw_file.content }}"
            mode: '0644'
