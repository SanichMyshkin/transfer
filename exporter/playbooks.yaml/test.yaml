---
- name: Download GitLab project configs to host
  hosts: your_target_host
  gather_facts: false
  vars:
    gitlab_url: "https://gitlab.example.com"
    private_token: "{{ lookup('env', 'GITLAB_TOKEN') }}"
    group_id: "your_group_id"
    branch: "master"
    output_dir: "/opt/nexus/configs"

  tasks:

    - name: Get all projects in group
      uri:
        url: "{{ gitlab_url }}/api/v4/groups/{{ group_id }}/projects?per_page=100"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ private_token }}"
        return_content: true
      register: projects_response

    - name: Set list of projects
      set_fact:
        projects: "{{ projects_response.json }}"

    - name: Ensure output directory exists
      file:
        path: "{{ output_dir }}"
        state: directory
        mode: '0755'

    - name: Get nexus-cleaner files for each project
      uri:
        url: "{{ gitlab_url }}/api/v4/projects/{{ item.id }}/repository/tree?path=nexus/nexus-cleaner&ref={{ branch }}"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ private_token }}"
        return_content: true
      loop: "{{ projects }}"
      loop_control:
        label: "{{ item.name }}"
      register: cleaner_file_lists

    - name: Download and save each file
      vars:
        project: "{{ projects[item.0] }}"
        files: "{{ item.1.json }}"
        project_prefix: "{{ project.path_with_namespace | regex_replace('/', '_') }}"
      with_indexed_items: "{{ cleaner_file_lists.results }}"
      when: item.1.status == 200 and item.1.json | length > 0
      loop_control:
        label: "{{ project.name }}"
      block:

        - name: Download individual files
          vars:
            project_id: "{{ project.id }}"
          loop: "{{ files }}"
          loop_control:
            loop_var: file
          tasks:

            - name: Get raw file content
              uri:
                url: "{{ gitlab_url }}/api/v4/projects/{{ project_id }}/repository/files/{{ file.path | urlencode }}/raw?ref={{ branch }}"
                method: GET
                headers:
                  PRIVATE-TOKEN: "{{ private_token }}"
                return_content: true
              register: raw_file

            - name: Save file to host
              copy:
                dest: "{{ output_dir }}/{{ project_prefix }}_{{ file.name }}"
                content: "{{ raw_file.content }}"
                mode: '0644'
