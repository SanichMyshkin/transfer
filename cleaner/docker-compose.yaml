services:

  nexus:
    image: sonatype/nexus3:3.78.0
    restart: unless-stopped
    container_name: nexus
    volumes:
      - ./nexus-data:/nexus-data
    ports:
      - "9090:8081"
      - "8082:8082"  # Docker registry
      - "8085:8085"  # Docker hosted
      - "8087:8087"  # Docker group
      - "8086:8086"  # Docker proxy
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms1024m -Xmx2048m -XX:MaxDirectMemorySize=2g -Djava.util.prefs.userRoot=/nexus-data
    networks:
      - nexusnet

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    restart: unless-stopped
    volumes:
      - ./minio-data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":8201" --address ":8200"
    ports:
      - "8200:8200"
      - "8201:8201"
    networks:
      - nexusnet

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nexusnet
    environment:
      JAVA_OPTS: "-Xms1024m -Xmx2048m"

volumes:
  nexus-data:
  minio-data:
  jenkins_home:

networks:
  nexusnet:
    driver: bridge
